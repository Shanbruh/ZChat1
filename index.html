<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat - Peer-to-Peer Chat</title>
    <meta name="description" content="Secure peer-to-peer chat with file sharing and calls">
    <link rel="manifest" href="/ZChat/manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%234F46E5'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white' font-family='Arial'%3EZ%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recordrtc@5.6.2/RecordRTC.min.js"></script>
    <style>
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .record-btn-recording {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .message-bubble {
            max-width: 70%;
            word-wrap: break-word;
        }
        .typing-indicator span {
            animation: typing 1.4s infinite;
            opacity: 0;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        .dark .dark-bg-primary { background-color: #1a1a1a; }
        .dark .dark-bg-secondary { background-color: #2d2d2d; }
        .dark .dark-text { color: #e5e5e5; }
        .dark .dark-border { border-color: #404040; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
    <div id="app" class="container mx-auto max-w-6xl h-screen p-4 hidden">
        <!-- Auth Screen -->
        <div id="auth-screen" class="max-w-md mx-auto mt-10">
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6">
                <h1 class="text-3xl font-bold text-center mb-6 text-indigo-600 dark:text-indigo-400">ZChat</h1>
                <div id="auth-tabs" class="flex mb-6">
                    <button class="flex-1 py-2 text-center border-b-2 border-indigo-600 font-semibold" data-tab="login">Login</button>
                    <button class="flex-1 py-2 text-center border-b-2 border-transparent" data-tab="signup">Sign Up</button>
                </div>
                
                <form id="login-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">ZChat ID</label>
                        <input type="text" id="login-id" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Password</label>
                        <input type="password" id="login-password" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600" required>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">Login</button>
                </form>

                <form id="signup-form" class="space-y-4 hidden">
                    <div>
                        <label class="block text-sm font-medium mb-1">Display Name</label>
                        <input type="text" id="signup-name" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">ZChat ID</label>
                        <input type="text" id="signup-id" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600" required>
                        <p class="text-xs text-gray-500 mt-1">This will be your unique Peer ID</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Password</label>
                        <input type="password" id="signup-password" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Profile Photo URL (optional)</label>
                        <input type="url" id="signup-photo" class="w-full px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600" placeholder="https://example.com/photo.jpg">
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">Sign Up</button>
                </form>
            </div>
        </div>

        <!-- Main Chat Interface -->
        <div id="chat-screen" class="h-full flex hidden">
            <!-- Sidebar -->
            <div class="w-80 bg-white dark:bg-gray-800 border-r dark:border-gray-700 flex flex-col">
                <!-- User Profile -->
                <div class="p-4 border-b dark:border-gray-700 flex items-center space-x-3">
                    <img id="profile-photo" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full object-cover">
                    <div class="flex-1">
                        <h3 id="display-name" class="font-semibold"></h3>
                        <p id="user-id" class="text-sm text-gray-500 dark:text-gray-400"></p>
                    </div>
                    <div class="flex space-x-2">
                        <button id="theme-toggle" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                            </svg>
                        </button>
                        <button id="logout-btn" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Add Contact -->
                <div class="p-4 border-b dark:border-gray-700">
                    <form id="add-contact-form" class="flex space-x-2">
                        <input type="text" id="contact-peer-id" placeholder="Add contact by Peer ID" class="flex-1 px-3 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600" required>
                        <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">Add</button>
                    </form>
                </div>

                <!-- Contacts List -->
                <div class="flex-1 overflow-y-auto">
                    <div class="p-2">
                        <h4 class="text-sm font-semibold text-gray-500 dark:text-gray-400 mb-2 px-2">CONTACTS</h4>
                        <div id="contacts-list" class="space-y-1"></div>
                    </div>
                </div>
            </div>

            <!-- Main Chat Area -->
            <div class="flex-1 flex flex-col bg-gray-50 dark:bg-gray-900">
                <!-- Chat Header -->
                <div id="chat-header" class="bg-white dark:bg-gray-800 p-4 border-b dark:border-gray-700 flex items-center justify-between hidden">
                    <div class="flex items-center space-x-3">
                        <img id="chat-contact-photo" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full">
                        <div>
                            <h3 id="chat-contact-name" class="font-semibold"></h3>
                            <div class="flex items-center space-x-2">
                                <span id="contact-status" class="text-sm text-gray-500 dark:text-gray-400">Offline</span>
                                <div id="typing-indicator" class="typing-indicator text-sm text-indigo-600 hidden">
                                    <span>typing</span><span>.</span><span>.</span><span>.</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="flex space-x-2">
                        <button id="mute-chat-btn" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full" title="Mute notifications">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
                            </svg>
                        </button>
                        <button id="video-call-btn" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                            </svg>
                        </button>
                        <button id="audio-call-btn" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Messages Area -->
                <div id="messages-area" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

                <!-- Message Input -->
                <div id="message-input-area" class="bg-white dark:bg-gray-800 p-4 border-t dark:border-gray-700 hidden">
                    <div class="flex items-end space-x-2">
                        <div class="flex-1 bg-gray-100 dark:bg-gray-700 rounded-lg px-3 py-2">
                            <textarea id="message-text" rows="1" placeholder="Type a message..." class="w-full bg-transparent outline-none resize-none max-h-32"></textarea>
                            <div class="flex items-center justify-between mt-1">
                                <div class="flex space-x-2">
                                    <button id="attach-file-btn" class="text-gray-500 hover:text-indigo-600">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path>
                                        </svg>
                                    </button>
                                    <button id="voice-note-btn" class="text-gray-500 hover:text-indigo-600 relative">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                                        </svg>
                                        <span id="voice-note-timer" class="absolute -top-6 left-1/2 transform -translate-x-1/2 bg-red-600 text-white text-xs px-2 py-1 rounded hidden">0s</span>
                                    </button>
                                </div>
                                <span id="char-count" class="text-xs text-gray-500">0/500</span>
                            </div>
                        </div>
                        <button id="send-message-btn" class="bg-indigo-600 text-white p-3 rounded-full hover:bg-indigo-700">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Call Modal -->
                <div id="call-modal" class="fixed inset-0 bg-black bg-opacity-75 hidden items-center justify-center z-50">
                    <div class="bg-white dark:bg-gray-800 rounded-lg p-6 max-w-md w-full">
                        <div class="text-center">
                            <h3 id="call-status" class="text-xl font-semibold mb-4">Incoming Call</h3>
                            <p id="caller-name" class="mb-6"></p>
                            <div id="local-video-container" class="hidden mb-4">
                                <video id="local-video" autoplay muted class="w-full rounded-lg"></video>
                            </div>
                            <div id="remote-video-container" class="hidden mb-4">
                                <video id="remote-video" autoplay class="w-full rounded-lg"></video>
                            </div>
                            <div class="flex justify-center space-x-4">
                                <button id="accept-call-btn" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 hidden">Accept</button>
                                <button id="reject-call-btn" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700">Reject</button>
                                <button id="end-call-btn" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 hidden">End Call</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
                "firebase/messaging": "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { getMessaging, getToken, onMessage } from 'firebase/messaging';

        // Firebase configuration - REPLACE WITH YOUR OWN
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        // VAPID key from Firebase Console
        const vapidKey = "YOUR_VAPID_KEY";

        // App State
        let currentUser = null;
        let peer = null;
        let currentContact = null;
        let contacts = {};
        let messages = {};
        let typingTimeout = null;
        let mediaStream = null;
        let currentCall = null;
        let voiceNoteRecorder = null;
        let voiceNoteTimer = null;
        let notificationPermission = false;

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            setupEventListeners();
            initializeFirebaseMessaging();
            loadTheme();
        });

        // Firebase Messaging Setup
        async function initializeFirebaseMessaging() {
            try {
                console.log('Requesting notification permission...');
                const permission = await Notification.requestPermission();
                
                if (permission === 'granted') {
                    notificationPermission = true;
                    console.log('Notification permission granted.');
                    
                    // Register service worker
                    const registration = await navigator.serviceWorker.register('/ZChat/firebase-messaging-sw.js');
                    console.log('Service Worker registered');

                    // Get FCM token
                    const token = await getToken(messaging, { 
                        vapidKey: vapidKey,
                        serviceWorkerRegistration: registration 
                    });
                    
                    if (token) {
                        console.log('FCM Token:', token);
                        localStorage.setItem('fcmToken', token);
                        
                        // Store token with user data if logged in
                        if (currentUser) {
                            await storeFCMToken(currentUser.id, token);
                        }
                    } else {
                        console.log('No registration token available.');
                    }
                } else {
                    console.log('Notification permission denied');
                }

                // Handle foreground messages
                onMessage(messaging, (payload) => {
                    console.log('Message received in foreground:', payload);
                    
                    // Show in-app notification
                    if (payload.notification) {
                        showInAppNotification(payload);
                    }
                });

            } catch (error) {
                console.error('Firebase messaging initialization error:', error);
            }
        }

        async function storeFCMToken(userId, token) {
            // Store token in localStorage (in a real app, this would be sent to a server)
            const userTokens = JSON.parse(localStorage.getItem('fcmTokens') || '{}');
            userTokens[userId] = token;
            localStorage.setItem('fcmTokens', JSON.stringify(userTokens));
        }

        function showInAppNotification(payload) {
            const { notification } = payload;
            const toast = document.createElement('div');
            toast.className = 'fixed top-4 right-4 bg-white dark:bg-gray-800 shadow-lg rounded-lg p-4 max-w-sm z-50 animate-slide-in';
            toast.innerHTML = `
                <div class="flex items-start space-x-3">
                    <div class="flex-1">
                        <h4 class="font-semibold">${notification.title || 'New Message'}</h4>
                        <p class="text-sm text-gray-600 dark:text-gray-400">${notification.body || ''}</p>
                    </div>
                    <button onclick="this.parentElement.parentElement.remove()" class="text-gray-500 hover:text-gray-700">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            `;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 5000);
        }

        // Authentication Functions
        function checkAuth() {
            const savedUser = localStorage.getItem('zchatUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('chat-screen').classList.remove('hidden');
                document.getElementById('app').classList.remove('hidden');
                initializePeer();
                loadUserData();
                loadContacts();
            } else {
                document.getElementById('app').classList.remove('hidden');
            }
        }

        function setupEventListeners() {
            // Auth tabs
            document.querySelectorAll('[data-tab]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const tab = e.target.dataset.tab;
                    document.querySelectorAll('[data-tab]').forEach(b => {
                        b.classList.toggle('border-indigo-600', b.dataset.tab === tab);
                        b.classList.toggle('border-transparent', b.dataset.tab !== tab);
                    });
                    document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
                    document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
                });
            });

            // Login form
            document.getElementById('login-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const id = document.getElementById('login-id').value;
                const password = document.getElementById('login-password').value;
                
                const users = JSON.parse(localStorage.getItem('zchatUsers') || '{}');
                if (users[id] && users[id].password === password) {
                    currentUser = users[id];
                    localStorage.setItem('zchatUser', JSON.stringify(currentUser));
                    checkAuth();
                } else {
                    alert('Invalid credentials');
                }
            });

            // Signup form
            document.getElementById('signup-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('signup-name').value;
                const id = document.getElementById('signup-id').value;
                const password = document.getElementById('signup-password').value;
                const photo = document.getElementById('signup-photo').value || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=4F46E5&color=fff`;

                const users = JSON.parse(localStorage.getItem('zchatUsers') || '{}');
                if (users[id]) {
                    alert('ZChat ID already exists');
                    return;
                }

                const newUser = { name, id, password, photo, contacts: [], mutedChats: [] };
                users[id] = newUser;
                localStorage.setItem('zchatUsers', JSON.stringify(users));
                
                currentUser = newUser;
                localStorage.setItem('zchatUser', JSON.stringify(currentUser));
                checkAuth();
            });

            // Logout
            document.getElementById('logout-btn').addEventListener('click', () => {
                if (peer) peer.destroy();
                localStorage.removeItem('zchatUser');
                location.reload();
            });

            // Theme toggle
            document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

            // Add contact
            document.getElementById('add-contact-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const peerId = document.getElementById('contact-peer-id').value;
                
                // Check if user exists
                const users = JSON.parse(localStorage.getItem('zchatUsers') || '{}');
                if (!users[peerId]) {
                    alert('User not found');
                    return;
                }

                if (!currentUser.contacts.includes(peerId)) {
                    currentUser.contacts.push(peerId);
                    updateUserData();
                    await saveContact(peerId, users[peerId]);
                    loadContacts();
                }
                
                document.getElementById('contact-peer-id').value = '';
            });

            // Chat selection
            document.getElementById('contacts-list').addEventListener('click', (e) => {
                const contactItem = e.target.closest('.contact-item');
                if (contactItem) {
                    const peerId = contactItem.dataset.peerId;
                    selectContact(peerId);
                }
            });

            // Send message
            document.getElementById('send-message-btn').addEventListener('click', sendMessage);
            document.getElementById('message-text').addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Typing indicator
            document.getElementById('message-text').addEventListener('input', (e) => {
                const text = e.target.value;
                document.getElementById('char-count').textContent = `${text.length}/500`;
                
                if (currentContact && peer) {
                    clearTimeout(typingTimeout);
                    sendTypingStatus(true);
                    typingTimeout = setTimeout(() => sendTypingStatus(false), 2000);
                }
            });

            // File attachment
            document.getElementById('attach-file-btn').addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*,.pdf,.doc,.docx,.txt';
                input.onchange = (e) => sendFile(e.target.files[0]);
                input.click();
            });

            // Voice note
            const voiceNoteBtn = document.getElementById('voice-note-btn');
            let pressTimer;
            
            voiceNoteBtn.addEventListener('mousedown', startVoiceNote);
            voiceNoteBtn.addEventListener('mouseup', stopVoiceNote);
            voiceNoteBtn.addEventListener('mouseleave', stopVoiceNote);
            voiceNoteBtn.addEventListener('touchstart', startVoiceNote);
            voiceNoteBtn.addEventListener('touchend', stopVoiceNote);

            // Call controls
            document.getElementById('video-call-btn').addEventListener('click', () => startCall('video'));
            document.getElementById('audio-call-btn').addEventListener('click', () => startCall('audio'));
            document.getElementById('accept-call-btn').addEventListener('click', acceptCall);
            document.getElementById('reject-call-btn').addEventListener('click', rejectCall);
            document.getElementById('end-call-btn').addEventListener('click', endCall);

            // Mute chat
            document.getElementById('mute-chat-btn').addEventListener('click', toggleMuteChat);
        }

        // PeerJS Initialization
        function initializePeer() {
            peer = new Peer(currentUser.id, {
                config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
            });

            peer.on('open', (id) => {
                console.log('PeerJS connected with ID:', id);
                updateOnlineStatus(true);
            });

            peer.on('connection', (conn) => {
                handleIncomingConnection(conn);
            });

            peer.on('call', (call) => {
                handleIncomingCall(call);
            });

            peer.on('error', (err) => {
                console.error('PeerJS error:', err);
            });
        }

        // Data Connection Handlers
        function handleIncomingConnection(conn) {
            conn.on('open', () => {
                console.log('Connection opened with:', conn.peer);
                
                conn.on('data', (data) => {
                    handleIncomingData(conn.peer, data);
                });

                // Send online status
                conn.send({ type: 'status', status: 'online' });
            });

            conn.on('close', () => {
                updateContactStatus(conn.peer, false);
            });
        }

        function handleIncomingData(peerId, data) {
            switch(data.type) {
                case 'message':
                    receiveMessage(peerId, data);
                    break;
                case 'typing':
                    handleTypingIndicator(peerId, data.isTyping);
                    break;
                case 'status':
                    updateContactStatus(peerId, data.status === 'online');
                    break;
                case 'file':
                case 'voice-note':
                    receiveFile(peerId, data);
                    break;
                case 'delivery':
                case 'read':
                    updateMessageStatus(data.messageId, data.type);
                    break;
            }
        }

        // Messaging Functions
        async function sendMessage() {
            const text = document.getElementById('message-text').value.trim();
            if (!text || !currentContact || !peer) return;

            const message = {
                type: 'message',
                id: generateMessageId(),
                text: text,
                sender: currentUser.id,
                timestamp: Date.now(),
                status: 'sent'
            };

            // Display message
            displayMessage(currentContact, message, true);

            // Send to peer
            try {
                const conn = getConnection(currentContact);
                if (conn && conn.open) {
                    conn.send(message);
                    message.status = 'delivered';
                    
                    // Simulate read receipt after 2 seconds
                    setTimeout(() => {
                        if (conn && conn.open) {
                            conn.send({ type: 'read', messageId: message.id });
                            updateMessageStatus(message.id, 'read');
                        }
                    }, 2000);
                }
            } catch (error) {
                console.error('Error sending message:', error);
                message.status = 'failed';
            }

            // Save message
            saveMessage(currentContact, message);
            
            document.getElementById('message-text').value = '';
            document.getElementById('char-count').textContent = '0/500';
        }

        function receiveMessage(peerId, data) {
            // Display message
            displayMessage(peerId, data, false);
            
            // Save message
            saveMessage(peerId, data);

            // Update unread count
            if (currentContact !== peerId) {
                updateUnreadCount(peerId);
            }

            // Send delivery receipt
            const conn = getConnection(peerId);
            if (conn && conn.open) {
                conn.send({ type: 'delivery', messageId: data.id });
            }

            // Show notification if app is in background or chat not open
            if (document.hidden || currentContact !== peerId) {
                showMessageNotification(peerId, data);
            }
        }

        // File Sharing
        async function sendFile(file) {
            if (!file || !currentContact) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const fileData = {
                    type: 'file',
                    id: generateMessageId(),
                    name: file.name,
                    size: file.size,
                    mimeType: file.type,
                    data: e.target.result,
                    sender: currentUser.id,
                    timestamp: Date.now()
                };

                displayFileMessage(currentContact, fileData, true);

                const conn = getConnection(currentContact);
                if (conn && conn.open) {
                    conn.send(fileData);
                }

                saveMessage(currentContact, fileData);
            };

            if (file.type.startsWith('image/')) {
                reader.readAsDataURL(file);
            } else {
                reader.readAsArrayBuffer(file);
            }
        }

        function receiveFile(peerId, fileData) {
            displayFileMessage(peerId, fileData, false);
            saveMessage(peerId, fileData);

            if (document.hidden || currentContact !== peerId) {
                showFileNotification(peerId, fileData);
            }
        }

        // Voice Notes
        async function startVoiceNote() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                voiceNoteRecorder = new RecordRTC(stream, {
                    type: 'audio',
                    mimeType: 'audio/webm',
                    recorderType: RecordRTC.StereoAudioRecorder,
                    numberOfAudioChannels: 1
                });

                voiceNoteRecorder.startRecording();
                
                // Show timer
                const timerEl = document.getElementById('voice-note-timer');
                timerEl.classList.remove('hidden');
                let seconds = 0;
                voiceNoteTimer = setInterval(() => {
                    seconds++;
                    timerEl.textContent = `${seconds}s`;
                }, 1000);

                document.getElementById('voice-note-btn').classList.add('record-btn-recording');
            } catch (error) {
                console.error('Error starting voice note:', error);
            }
        }

        async function stopVoiceNote() {
            if (!voiceNoteRecorder) return;

            clearInterval(voiceNoteTimer);
            document.getElementById('voice-note-timer').classList.add('hidden');
            document.getElementById('voice-note-btn').classList.remove('record-btn-recording');

            voiceNoteRecorder.stopRecording(() => {
                const blob = voiceNoteRecorder.getBlob();
                const reader = new FileReader();
                
                reader.onload = (e) => {
                    const voiceNote = {
                        type: 'voice-note',
                        id: generateMessageId(),
                        data: e.target.result,
                        duration: voiceNoteRecorder.getDuration(),
                        sender: currentUser.id,
                        timestamp: Date.now()
                    };

                    // Display locally
                    displayVoiceNote(currentContact, voiceNote, true);

                    // Send to peer
                    const conn = getConnection(currentContact);
                    if (conn && conn.open) {
                        conn.send(voiceNote);
                    }

                    saveMessage(currentContact, voiceNote);
                };

                reader.readAsDataURL(blob);
            });

            voiceNoteRecorder = null;
        }

                    </div>` : ''}
                    <div class="flex items-center space-x-2">

        // Audio/Video Calls
        async function startCall(type) {
            if (!currentContact) return;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: true, 
                    video: type === 'video' 
                });

                mediaStream = stream;
                
                const call = peer.call(currentContact, stream);
                currentCall = call;

                setupCallHandlers(call, type);
                showCallModal('outgoing', type);
            } catch (error) {
                console.error('Error starting call:', error);
                alert('Could not access camera/microphone');
            }
        }

        function handleIncomingCall(call) {
            currentCall = call;
            
            // Show incoming call modal
            const callerName = contacts[call.peer]?.name || call.peer;
            document.getElementById('caller-name').textContent = `${callerName} is calling...`;
            document.getElementById('call-status').textContent = 'Incoming Call';
            document.getElementById('accept-call-btn').classList.remove('hidden');
            document.getElementById('reject-call-btn').classList.remove('hidden');
            document.getElementById('end-call-btn').classList.add('hidden');
            document.getElementById('call-modal').classList.add('flex');
            document.getElementById('call-modal').classList.remove('hidden');

            // Set up call handlers
            setupCallHandlers(call, call.metadata?.type || 'audio');
        }

        async function acceptCall() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: true, 
                    video: currentCall.metadata?.type === 'video' 
                });

                mediaStream = stream;
                currentCall.answer(stream);

                document.getElementById('accept-call-btn').classList.add('hidden');
                document.getElementById('end-call-btn').classList.remove('hidden');
            } catch (error) {
                console.error('Error accepting call:', error);
            }
        }

        function rejectCall() {
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            closeCallModal();
        }

        function endCall() {
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            closeCallModal();
        }

        function setupCallHandlers(call, type) {
            call.on('stream', (remoteStream) => {
                const remoteVideo = document.getElementById('remote-video');
                remoteVideo.srcObject = remoteStream;
                document.getElementById('remote-video-container').classList.remove('hidden');
            });

            call.on('close', () => {
                endCall();
            });

            call.on('error', (err) => {
                console.error('Call error:', err);
                endCall();
            });

            // Set call metadata
            call.metadata = { type };
        }

        function showCallModal(direction, type) {
            document.getElementById('call-status').textContent = direction === 'outgoing' ? 'Calling...' : 'Incoming Call';
            document.getElementById('local-video-container').classList.toggle('hidden', type !== 'video');
            document.getElementById('accept-call-btn').classList.toggle('hidden', direction === 'outgoing');
            document.getElementById('reject-call-btn').classList.remove('hidden');
            document.getElementById('end-call-btn').classList.toggle('hidden', direction === 'outgoing');
            document.getElementById('call-modal').classList.add('flex');
            document.getElementById('call-modal').classList.remove('hidden');

            if (type === 'video' && mediaStream) {
                const localVideo = document.getElementById('local-video');
                localVideo.srcObject = mediaStream;
            }
        }

        function closeCallModal() {
            document.getElementById('call-modal').classList.add('hidden');
            document.getElementById('call-modal').classList.remove('flex');
            document.getElementById('local-video-container').classList.add('hidden');
            document.getElementById('remote-video-container').classList.add('hidden');
            document.getElementById('local-video').srcObject = null;
            document.getElementById('remote-video').srcObject = null;
        }

        // Contact Management
        async function saveContact(peerId, userData) {
            contacts[peerId] = {
                id: peerId,
                name: userData.name,
                photo: userData.photo,
                online: false
            };
            
            updateUserData();
            renderContacts();
        }

        function loadContacts() {
            if (!currentUser?.contacts) return;
            
            const users = JSON.parse(localStorage.getItem('zchatUsers') || '{}');
            currentUser.contacts.forEach(peerId => {
                if (users[peerId]) {
                    contacts[peerId] = {
                        id: peerId,
                        name: users[peerId].name,
                        photo: users[peerId].photo,
                        online: false
                    };
                }
            });
            
            renderContacts();
        }

        function renderContacts() {
            const contactsList = document.getElementById('contacts-list');
            contactsList.innerHTML = '';

            Object.values(contacts).forEach(contact => {
                const unread = getUnreadCount(contact.id);
                const muted = currentUser.mutedChats?.includes(contact.id);
                
                const contactEl = document.createElement('div');
                contactEl.className = `contact-item p-3 rounded-lg cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 ${currentContact === contact.id ? 'bg-gray-200 dark:bg-gray-600' : ''}`;
                contactEl.dataset.peerId = contact.id;
                
                contactEl.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <div class="relative">
                            <img src="${contact.photo}" class="w-10 h-10 rounded-full">
                            <span class="absolute bottom-0 right-0 w-3 h-3 ${contact.online ? 'bg-green-500' : 'bg-gray-400'} rounded-full border-2 border-white"></span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between">
                                <h4 class="font-medium truncate">${contact.name}</h4>
                                <div class="flex items-center space-x-1">
                                    ${muted ? '<span class="text-gray-400 text-xs">🔇</span>' : ''}
                                    ${unread > 0 ? `<span class="bg-indigo-600 text-white text-xs rounded-full px-2 py-1">${unread}</span>` : ''}
                                </div>
                            </div>
                            <p class="text-sm text-gray-500 dark:text-gray-400 truncate">${contact.id}</p>
                        </div>
                    </div>
                `;
                
                contactsList.appendChild(contactEl);
            });
        }

        function selectContact(peerId) {
            currentContact = peerId;
            
            // Update UI
            document.getElementById('chat-header').classList.remove('hidden');
            document.getElementById('message-input-area').classList.remove('hidden');
            
            const contact = contacts[peerId];
            document.getElementById('chat-contact-name').textContent = contact.name;
            document.getElementById('chat-contact-photo').src = contact.photo;
            document.getElementById('contact-status').textContent = contact.online ? 'Online' : 'Offline';
            
            // Clear unread count
            clearUnreadCount(peerId);
            
            // Load messages
            loadMessages(peerId);
            
            // Update contact list selection
            renderContacts();
            
            // Send read receipts for all messages
            sendReadReceipts(peerId);
        }

        // Message Storage
        function saveMessage(peerId, message) {
            if (!messages[peerId]) {
                messages[peerId] = [];
            }
            messages[peerId].push(message);
            
            // Trim old messages (keep last 100)
            if (messages[peerId].length > 100) {
                messages[peerId] = messages[peerId].slice(-100);
            }
            
            localStorage.setItem(`messages_${peerId}`, JSON.stringify(messages[peerId]));
        }

        function loadMessages(peerId) {
            const saved = localStorage.getItem(`messages_${peerId}`);
            messages[peerId] = saved ? JSON.parse(saved) : [];
            
            const messagesArea = document.getElementById('messages-area');
            messagesArea.innerHTML = '';
            
            messages[peerId].forEach(msg => {
                if (msg.type === 'message') {
                    displayMessage(peerId, msg, msg.sender === currentUser.id);
                } else if (msg.type === 'file') {
                    displayFileMessage(peerId, msg, msg.sender === currentUser.id);
                } else if (msg.type === 'voice-note') {
                    displayVoiceNote(peerId, msg, msg.sender === currentUser.id);
                }
            });
        }

        // Typing Indicator
        function sendTypingStatus(isTyping) {
            if (!currentContact) return;
            
            const conn = getConnection(currentContact);
            if (conn && conn.open) {
                conn.send({ type: 'typing', isTyping });
            }
        }

        function handleTypingIndicator(peerId, isTyping) {
            if (peerId === currentContact) {
                document.getElementById('typing-indicator').classList.toggle('hidden', !isTyping);
            }
        }

        // Message Status
        function updateMessageStatus(messageId, status) {
            const messageDiv = document.querySelector(`[data-message-id="${messageId}"]`);
            if (messageDiv) {
                const statusEl = messageDiv.querySelector('.message-status');
                if (statusEl) {
                    statusEl.textContent = status === 'delivered' ? '✓✓' : '✓✓';
                }
            }
        }

        function sendReadReceipts(peerId) {
            const conn = getConnection(peerId);
            if (!conn || !conn.open) return;

            const unreadMessages = messages[peerId]?.filter(m => m.sender !== currentUser.id && m.status !== 'read') || [];
            unreadMessages.forEach(msg => {
                conn.send({ type: 'read', messageId: msg.id });
            });
        }

        // Connection Management
        function getConnection(peerId) {
            // In a real app, you'd maintain connections map
            // This is simplified
            return peer.connections[peerId]?.[0];
        }

        function updateOnlineStatus(online) {
            if (currentUser) {
                Object.keys(contacts).forEach(peerId => {
                    const conn = getConnection(peerId);
                    if (conn && conn.open) {
                        conn.send({ type: 'status', status: online ? 'online' : 'offline' });
                    }
                });
            }
        }

        function updateContactStatus(peerId, online) {
            if (contacts[peerId]) {
                contacts[peerId].online = online;
                if (peerId === currentContact) {
                    document.getElementById('contact-status').textContent = online ? 'Online' : 'Offline';
                }
                renderContacts();
            }
        }

        // Notifications
        function showMessageNotification(peerId, message) {
            if (currentUser.mutedChats?.includes(peerId)) return;

            const contact = contacts[peerId] || { name: peerId };
            
            // Send via FCM
            sendFCMNotification(peerId, {
                title: contact.name,
                body: message.text,
                icon: contact.photo,
                data: { peerId, messageId: message.id }
            });

            // Also show in-app if needed
            if (!document.hidden) {
                showInAppNotification({
                    notification: {
                        title: contact.name,
                        body: message.text
                    }
                });
            }
        }

        function showFileNotification(peerId, fileData) {
            if (currentUser.mutedChats?.includes(peerId)) return;

            const contact = contacts[peerId] || { name: peerId };
            
            sendFCMNotification(peerId, {
                title: contact.name,
                body: `Sent a file: ${fileData.name}`,
                icon: contact.photo,
                data: { peerId, fileId: fileData.id, type: 'file' }
            });
        }

        async function sendFCMNotification(targetPeerId, notification) {
            // In a real app, this would be sent through your server
            // For demo, we'll just log it
            console.log('FCM Notification would be sent:', notification);
            
            // Store for background service worker
            localStorage.setItem('lastNotification', JSON.stringify(notification));
        }

        // Mute Chat
        function toggleMuteChat() {
            if (!currentUser.mutedChats) {
                currentUser.mutedChats = [];
            }

            const index = currentUser.mutedChats.indexOf(currentContact);
            if (index === -1) {
                currentUser.mutedChats.push(currentContact);
            } else {
                currentUser.mutedChats.splice(index, 1);
            }

            updateUserData();
            renderContacts();
        }

        // Unread Counts
        function getUnreadCount(peerId) {
            const counts = JSON.parse(localStorage.getItem('unreadCounts') || '{}');
            return counts[peerId] || 0;
        }

        function updateUnreadCount(peerId) {
            const counts = JSON.parse(localStorage.getItem('unreadCounts') || '{}');
            counts[peerId] = (counts[peerId] || 0) + 1;
            localStorage.setItem('unreadCounts', JSON.stringify(counts));
            renderContacts();
        }

        function clearUnreadCount(peerId) {
            const counts = JSON.parse(localStorage.getItem('unreadCounts') || '{}');
            delete counts[peerId];
            localStorage.setItem('unreadCounts', JSON.stringify(counts));
        }

        // User Data Management
        function updateUserData() {
            const users = JSON.parse(localStorage.getItem('zchatUsers') || '{}');
            users[currentUser.id] = currentUser;
            localStorage.setItem('zchatUsers', JSON.stringify(users));
            localStorage.setItem('zchatUser', JSON.stringify(currentUser));
            
            document.getElementById('display-name').textContent = currentUser.name;
            document.getElementById('user-id').textContent = currentUser.id;
            document.getElementById('profile-photo').src = currentUser.photo;
        }

        function loadUserData() {
            document.getElementById('display-name').textContent = currentUser.name;
            document.getElementById('user-id').textContent = currentUser.id;
            document.getElementById('profile-photo').src = currentUser.photo;
        }

        // Theme System
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function loadTheme() {
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            }
        }

        // Utility Functions
        function generateMessageId() {
            return `${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Make functions available globally for onclick handlers
        window.downloadFile = (data, filename) => {
            const link = document.createElement('a');
            link.href = data;
            link.download = filename;
            link.click();
        };
    </script>
</body>
